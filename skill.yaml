name: vulcan-codekit
version: 0.1.1
debug: false
help:
  main:
    description: Main Vulcan CodeKit help and workflow navigation.
    file: help/vulcan_codekit_skill.lua
  topics:
    - name: ast-detail
      description: Exact-file AST structure inspection workflow.
      file: help/ast-detail.md
    - name: rg
      description: Text-anchor to owner-context lookup workflow.
      file: help/rg.md
    - name: markdown-menu
      description: Markdown heading navigation workflow.
      file: help/markdown-menu.md
    - name: node-source
      description: Function or method source extraction workflow by structural_path.
      file: help/node-source.md
    - name: tree
      description: Project structure mapping and candidate-file selection workflow.
      file: help/tree.md
    - name: patch
      description: Safe whole-function replacement workflow.
      file: help/patch.md
entries:
  - name: ast-detail
    description: "[FILE AST DETAIL] Inspect one or more exact source files and return plain Markdown AST details. Use this only after you already know the exact files, typically from codekit-ast-tree or codekit-rg."
    lua_entry: runtime/codekit-ast-detail.lua
    lua_module: codekit_ast_detail
    help: ast-detail
    parameters:
      - name: paths
        type: string
        description: "One or more explicit source-file paths separated by newlines (\\n). This tool does not accept directories or mixed path sets, and it supports at most 20 files per request."
        required: true
      - name: comment
        type: boolean
        description: "Include condensed comment summaries for functions in the structural output (default: false). Separator-style comment banners and metadata-only lines such as params/returns are filtered out, and each summary is compressed to a short single-line note."
        required: false
  - name: rg
    description: "[TEXT-TO-STRUCTURE BRIDGE] Use this after you have a text signal or regex target. Search a directory with ripgrep, then return only the directly relevant function/class AST context as plain Markdown."
    lua_entry: runtime/codekit-rg.lua
    lua_module: codekit_rg
    help: rg
    parameters:
      - name: dir
        type: string
        description: "Required. Target directory to search recursively; must point to an existing directory."
        required: true
      - name: extensions
        type: string
        description: "Optional file-extension filter, comma-separated (for example lua,rs,ts). Common language names such as rust or typescript are normalized to their extensions. When omitted, the default source-code set is used: bash, sh, zsh, c, h, cpp, cxx, cc, c++, hpp, hh, hxx, cu, ino, cs, ex, exs, go, hs, java, js, jsx, mjs, cjs, kt, kts, ktm, lua, nix, php, phtml, py, pyi, py3, bzl, rb, rbw, gemspec, rs, scala, sc, sbt, sol, swift, ts, mts, cts, tsx. The default excludes css, html, json, yaml/yml, hcl/tf/tfvars, and md."
        required: false
      - name: noignore
        type: boolean
        description: "Disable ignore rules only when set to true. Leave it unset for the normal ignored-by-default search behavior."
        required: false
      - name: rg_pattern
        type: string
        description: "Ripgrep regex used for the first-pass text search. By default this uses ripgrep's Rust regex engine, so PCRE2-only features such as look-around and backreferences are rejected unless regex_engine is set to pcre2."
        required: true
      - name: regex_engine
        type: string
        description: "Regex engine for rg_pattern. Allowed values: rust or pcre2. Defaults to rust for predictable performance; pcre2 adds ripgrep --pcre2 for look-around/backreference patterns."
        required: false
  - name: markdown-menu
    description: "[MARKDOWN MENU] Triage Markdown files by headings only. Use this to locate the right docs file or section before reading body text elsewhere."
    lua_entry: runtime/codekit-markdown-menu.lua
    lua_module: codekit_markdown_menu
    help: markdown-menu
    parameters:
      - name: path
        type: string
        description: "Target path. Supports a single file/directory, or multiple paths separated by newlines (\\n). Directory and file paths may be mixed in one request and duplicate Markdown files are automatically removed."
        required: false
      - name: recursive
        type: boolean
        description: "Whether to recurse into subdirectories when a directory is encountered (default: false). Keep this false for top-level doc triage and enable it only when you need nested Markdown files."
        required: false
      - name: noignore
        type: boolean
        description: "Disable ignore rules only when set to true. Leave it unset for the normal ignored-by-default documentation scan behavior."
        required: false
  - name: node-source
    description: "[NODE SOURCE] Extract the full source text for one or more function or method nodes selected by structural_path. Uses a required nodes[] payload where each node item carries its own file and structural_path, including same-file and cross-file batches."
    lua_entry: runtime/codekit-node-source.lua
    lua_module: codekit_node_source
    help: node-source
    parameters:
      - name: nodes
        type: array
        description: "Required node input. Each item must be an object with file and structural_path fields, for example [{\"file\":\"src/main.rs\",\"structural_path\":\"main\"}]. structural_path is a slash-separated structural path suffix, not a regex or glob; examples include main, UserService/get_user, impl MyType/new, and impl MyTrait for MyType/run. If a structural_path matches multiple functions or methods, the tool returns candidates instead of choosing automatically. For same-file batches repeat the same file or place newline-separated structural paths in that item's structural_path field."
        required: true
      - name: max_nodes
        type: number
        description: "Maximum node requests to process before marking the rest as skipped. Defaults to 20."
        required: false
  - name: ast-tree
    description: "[DIRECTORY AST TREE] Pick candidate source files from exactly one directory before deep inspection. Returns a compact recursive Markdown tree grouped by subdirectory."
    lua_entry: runtime/codekit-ast-tree.lua
    lua_module: codekit_ast_tree
    help: tree
    parameters:
      - name: dir
        type: string
        description: "Exactly one existing directory path to scan recursively. Files, newline-separated path lists, and multiple directories are rejected."
        required: true
      - name: extensions
        type: string
        description: "Optional file-extension filter, comma-separated (for example rs,ts,tsx). Common language names such as rust or typescript are normalized to their extensions. When omitted, the default source-code set is used: bash, sh, zsh, c, h, cpp, cxx, cc, c++, hpp, hh, hxx, cu, ino, cs, ex, exs, go, hs, java, js, jsx, mjs, cjs, kt, kts, ktm, lua, nix, php, phtml, py, pyi, py3, bzl, rb, rbw, gemspec, rs, scala, sc, sbt, sol, swift, ts, mts, cts, tsx. The default excludes css, html, json, yaml/yml, hcl/tf/tfvars, and md."
        required: false
      - name: noignore
        type: boolean
        description: "Disable ignore rules only when set to true. Leave it unset for the normal ignored-by-default tree scan behavior."
        required: false
  - name: patch
    description: "[FUNCTION AST PATCH] Replace one or more functions or methods by structural_path. Supports either single mode (file+structural_path+replacement) or batch mode (patches[]); these modes are mutually exclusive. Batch mode defaults to atomic=true, so any validation failure rejects the whole batch before writing."
    lua_entry: runtime/codekit-patch.lua
    lua_module: codekit_patch
    help: patch
    parameters:
      - name: file
        type: string
        description: "Target file that contains the function or method to patch. Required only in single mode; omit it when patches[] is non-empty."
        required: false
      - name: structural_path
        type: string
        description: "Slash-separated structural path suffix for a function or method. It is not a regex or glob; examples include main, UserService/get_user, impl MyType/new, and impl MyTrait for MyType/run. If it matches no node the patch is rejected; if it matches multiple nodes the patch is rejected with candidate paths. Required only in single mode; omit it when patches[] is non-empty."
        required: false
      - name: replacement
        type: string
        description: "Replacement source text. It must be the complete function or method source, starting from the declaration line. Required only in single mode; omit it when patches[] is non-empty."
        required: false
      - name: precondition
        type: object
        description: "Optional stale-check object for single mode: {node_hash, file_hash, range}. node_hash must match the currently matched node source, file_hash must match the current whole file, and range must match the current node line range. Any mismatch rejects the patch with stale_* diagnostics. Omit top-level precondition when patches[] is non-empty; use per-item precondition instead."
        required: false
      - name: patches
        type: array
        description: "Optional batch input. Each item must include file, structural_path, and replacement. Each item may include precondition: {node_hash, file_hash, range}. Do not combine a non-empty patches[] with top-level file, structural_path, replacement, or precondition; mixed modes are rejected. Any missing, ambiguous, stale, invalid, or overlapping patch rejects the whole batch when atomic=true."
        required: false
      - name: atomic
        type: boolean
        description: "Whether the batch should be all-or-nothing. Defaults to true. Set false only when partial application is explicitly desired."
        required: false
      - name: max_patches
        type: number
        description: "Maximum patch requests to process in one call. Defaults to 20."
        required: false
