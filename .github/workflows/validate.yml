name: Validate Vulcan CodeKit LuaSkill

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate strict skill layout
        run: python ./scripts/validate_skill.py

      - name: Package LuaSkill release path smoke
        run: python ./scripts/package_skill.py --out-dir dist-skill-smoke

      - name: Check LuaSkill archive root
        shell: python
        run: |
          from pathlib import Path
          from zipfile import ZipFile

          package_path = next(Path("dist-skill-smoke").glob("luaskills-vulcan-codekit-v*-skill.zip"))
          with ZipFile(package_path) as archive:
              names = archive.namelist()

          if not any(name.startswith("vulcan-codekit/") for name in names):
              raise SystemExit("LuaSkill package must contain a vulcan-codekit/ root directory")
          if any(name.startswith("luaskills-vulcan-codekit/") for name in names):
              raise SystemExit("LuaSkill package must not contain a luaskills-vulcan-codekit/ root directory")

      - name: Check ast-grep FFI dependency licenses
        run: cargo deny check -c deny.toml --exclude-dev licenses
        working-directory: ast-grep-ffi

      - name: Check generated dependency license report
        run: python ./scripts/generate_cargo_deny_notices.py --check

      - name: Test ast-grep FFI crate
        run: cargo test --manifest-path ast-grep-ffi/Cargo.toml

      - name: Build ast-grep FFI release path smoke
        run: cargo build --manifest-path ast-grep-ffi/Cargo.toml --release --target x86_64-unknown-linux-gnu --target-dir target

      - name: Package ast-grep FFI release path smoke
        run: python ./scripts/package_ffi.py --platform linux-x64 --library-path target/x86_64-unknown-linux-gnu/release/libvulcan_codekit_ast_grep_ffi.so --out-dir dist-ffi-smoke
