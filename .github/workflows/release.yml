name: Release Vulcan CodeKit LuaSkill

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-skill:
    name: Build skill package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate strict skill layout
        run: python ./scripts/validate_skill.py

      - name: Build release package
        run: python ./scripts/package_skill.py

      - name: Upload skill release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codekit-skill-release
          path: dist/*

  build-ffi:
    name: Build FFI ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            library_path: target/x86_64-pc-windows-msvc/release/vulcan_codekit_ast_grep_ffi.dll
          - platform: linux-x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            library_path: target/x86_64-unknown-linux-gnu/release/libvulcan_codekit_ast_grep_ffi.so
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            library_path: target/aarch64-unknown-linux-gnu/release/libvulcan_codekit_ast_grep_ffi.so
          - platform: macos-arm64
            runner: macos-14
            rust_target: aarch64-apple-darwin
            library_path: target/aarch64-apple-darwin/release/libvulcan_codekit_ast_grep_ffi.dylib
          - platform: macos-x64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            library_path: target/x86_64-apple-darwin/release/libvulcan_codekit_ast_grep_ffi.dylib
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build ast-grep FFI
        run: cargo build --manifest-path ast-grep-ffi/Cargo.toml --release --target ${{ matrix.rust_target }} --target-dir target

      - name: Package ast-grep FFI
        run: python ./scripts/package_ffi.py --platform ${{ matrix.platform }} --library-path ${{ matrix.library_path }}

      - name: Upload FFI release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ast-grep-ffi-${{ matrix.platform }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs:
      - build-skill
      - build-ffi
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
