tool_dependencies:
  - name: rg
    version: "14.1.1"
    required: true
    scope: skill
    source:
      type: github_release
      github:
        repo: BurntSushi/ripgrep
    packages:
      windows-x64:
        archive_type: zip
        asset_name: ripgrep-{version}-x86_64-pc-windows-msvc.zip
        exports:
          - archive_path: ripgrep-{version}-x86_64-pc-windows-msvc/rg.exe
            target_path: bin/rg.exe
      linux-x64:
        archive_type: tar_gz
        asset_name: ripgrep-{version}-x86_64-unknown-linux-musl.tar.gz
        exports:
          - archive_path: ripgrep-{version}-x86_64-unknown-linux-musl/rg
            target_path: bin/rg
            executable: true
      linux-arm64:
        archive_type: tar_gz
        asset_name: ripgrep-{version}-aarch64-unknown-linux-gnu.tar.gz
        exports:
          - archive_path: ripgrep-{version}-aarch64-unknown-linux-gnu/rg
            target_path: bin/rg
            executable: true
      macos-arm64:
        archive_type: tar_gz
        asset_name: ripgrep-{version}-aarch64-apple-darwin.tar.gz
        exports:
          - archive_path: ripgrep-{version}-aarch64-apple-darwin/rg
            target_path: bin/rg
            executable: true
      macos-x64:
        archive_type: tar_gz
        asset_name: ripgrep-{version}-x86_64-apple-darwin.tar.gz
        exports:
          - archive_path: ripgrep-{version}-x86_64-apple-darwin/rg
            target_path: bin/rg
            executable: true

lua_dependencies: []

ffi_dependencies:
  - name: ast-grep-ffi
    version: "0.1.2"
    required: true
    scope: skill
    source:
      type: github_release
      github:
        repo: LuaSkills/vulcan-codekit
    packages:
      windows-x64:
        archive_type: zip
        asset_name: ast-grep-ffi-windows-x64.zip
        exports:
          - archive_path: vulcan_codekit_ast_grep_ffi.dll
            target_path: lib/vulcan_codekit_ast_grep_ffi.dll
      linux-x64:
        archive_type: zip
        asset_name: ast-grep-ffi-linux-x64.zip
        exports:
          - archive_path: libvulcan_codekit_ast_grep_ffi.so
            target_path: lib/libvulcan_codekit_ast_grep_ffi.so
            executable: true
      linux-arm64:
        archive_type: zip
        asset_name: ast-grep-ffi-linux-arm64.zip
        exports:
          - archive_path: libvulcan_codekit_ast_grep_ffi.so
            target_path: lib/libvulcan_codekit_ast_grep_ffi.so
            executable: true
      macos-arm64:
        archive_type: zip
        asset_name: ast-grep-ffi-macos-arm64.zip
        exports:
          - archive_path: libvulcan_codekit_ast_grep_ffi.dylib
            target_path: lib/libvulcan_codekit_ast_grep_ffi.dylib
            executable: true
      macos-x64:
        archive_type: zip
        asset_name: ast-grep-ffi-macos-x64.zip
        exports:
          - archive_path: libvulcan_codekit_ast_grep_ffi.dylib
            target_path: lib/libvulcan_codekit_ast_grep_ffi.dylib
            executable: true
